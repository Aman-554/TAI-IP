<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunshine Weather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #FF6B6B;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            text-align: center;
            color: #FFA500;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 3px solid #FFD700;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: #FFFEF0;
        }

        input[type="text"]:focus {
            border-color: #FFA500;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.3);
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 165, 0, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 70px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            margin-top: 5px;
            display: none;
        }

        .suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f0f0f0;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
        }

        .weather-info {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .weather-info.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .city-name {
            text-align: center;
            font-size: 2em;
            color: #FF6B6B;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .weather-main {
            text-align: center;
            margin-bottom: 30px;
        }

        .temperature {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #FF6B6B, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-description {
            font-size: 1.5em;
            color: #667eea;
            text-transform: capitalize;
            margin-top: 10px;
        }

        .weather-icon {
            font-size: 6em;
            margin: 20px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .detail-box {
            background: linear-gradient(135deg, #FFFEF0, #FFF8DC);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .detail-box:hover {
            transform: translateY(-5px);
        }

        .detail-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .detail-label {
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #FF6B6B;
            font-size: 1.3em;
            font-weight: bold;
        }

        .error {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
            border-left: 5px solid #c62828;
        }

        .error.active {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            display: none;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #FFA500;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom scrollbar for suggestions */
        .suggestions::-webkit-scrollbar {
            width: 8px;
        }

        .suggestions::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .suggestions::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 10px;
        }

        .suggestions::-webkit-scrollbar-thumb:hover {
            background: #FF6B6B;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☀️ Sunshine Weather</h1>
        <p class="subtitle">Your daily weather companion</p>

        <div class="search-box">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button id="searchBtn">Search</button>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="weather-info" id="weatherInfo">
            <div class="city-name">
                <span id="cityName"></span>
                <span id="countryFlag"></span>
            </div>

            <div class="weather-main">
                <div class="weather-icon" id="weatherIcon"></div>
                <div class="temperature" id="temperature"></div>
                <div class="weather-description" id="description"></div>
            </div>

            <div class="weather-details">
                <div class="detail-box">
                    <div class="detail-icon">💧</div>
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-icon">💨</div>
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-icon">🌡️</div>
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feelsLike"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-icon">🔽</div>
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const suggestionsBox = document.getElementById('suggestions');
        const weatherInfo = document.getElementById('weatherInfo');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');

        // Popular cities for suggestions with coordinates
        const cities = [
            { name: 'New York', lat: 40.7128, lon: -74.0060, country: 'US' },
            { name: 'London', lat: 51.5074, lon: -0.1278, country: 'GB' },
            { name: 'Paris', lat: 48.8566, lon: 2.3522, country: 'FR' },
            { name: 'Tokyo', lat: 35.6762, lon: 139.6503, country: 'JP' },
            { name: 'Mumbai', lat: 19.0760, lon: 72.8777, country: 'IN' },
            { name: 'Delhi', lat: 28.6139, lon: 77.2090, country: 'IN' },
            { name: 'Bangalore', lat: 12.9716, lon: 77.5946, country: 'IN' },
            { name: 'Sydney', lat: -33.8688, lon: 151.2093, country: 'AU' },
            { name: 'Dubai', lat: 25.2048, lon: 55.2708, country: 'AE' },
            { name: 'Singapore', lat: 1.3521, lon: 103.8198, country: 'SG' },
            { name: 'Hong Kong', lat: 22.3193, lon: 114.1694, country: 'HK' },
            { name: 'Los Angeles', lat: 34.0522, lon: -118.2437, country: 'US' },
            { name: 'Chicago', lat: 41.8781, lon: -87.6298, country: 'US' },
            { name: 'Toronto', lat: 43.6532, lon: -79.3832, country: 'CA' },
            { name: 'Berlin', lat: 52.5200, lon: 13.4050, country: 'DE' },
            { name: 'Madrid', lat: 40.4168, lon: -3.7038, country: 'ES' },
            { name: 'Rome', lat: 41.9028, lon: 12.4964, country: 'IT' },
            { name: 'Amsterdam', lat: 52.3676, lon: 4.9041, country: 'NL' },
            { name: 'Barcelona', lat: 41.3851, lon: 2.1734, country: 'ES' },
            { name: 'Moscow', lat: 55.7558, lon: 37.6173, country: 'RU' },
            { name: 'Istanbul', lat: 41.0082, lon: 28.9784, country: 'TR' },
            { name: 'Bangkok', lat: 13.7563, lon: 100.5018, country: 'TH' },
            { name: 'Seoul', lat: 37.5665, lon: 126.9780, country: 'KR' },
            { name: 'Mexico City', lat: 19.4326, lon: -99.1332, country: 'MX' },
            { name: 'Shanghai', lat: 31.2304, lon: 121.4737, country: 'CN' },
            { name: 'Beijing', lat: 39.9042, lon: 116.4074, country: 'CN' },
            { name: 'São Paulo', lat: -23.5505, lon: -46.6333, country: 'BR' },
            { name: 'Buenos Aires', lat: -34.6037, lon: -58.3816, country: 'AR' },
            { name: 'Cairo', lat: 30.0444, lon: 31.2357, country: 'EG' },
            { name: 'Johannesburg', lat: -26.2041, lon: 28.0473, country: 'ZA' },
            { name: 'Melbourne', lat: -37.8136, lon: 144.9631, country: 'AU' },
            { name: 'Auckland', lat: -36.8485, lon: 174.7633, country: 'NZ' },
            { name: 'Vancouver', lat: 49.2827, lon: -123.1207, country: 'CA' },
            { name: 'San Francisco', lat: 37.7749, lon: -122.4194, country: 'US' },
            { name: 'Miami', lat: 25.7617, lon: -80.1918, country: 'US' },
            { name: 'Las Vegas', lat: 36.1699, lon: -115.1398, country: 'US' },
            { name: 'Boston', lat: 42.3601, lon: -71.0589, country: 'US' },
            { name: 'Seattle', lat: 47.6062, lon: -122.3321, country: 'US' },
            { name: 'Denver', lat: 39.7392, lon: -104.9903, country: 'US' },
            { name: 'Atlanta', lat: 33.7490, lon: -84.3880, country: 'US' },
            { name: 'Jaipur', lat: 26.9124, lon: 75.7873, country: 'IN' },
            { name: 'Hyderabad', lat: 17.3850, lon: 78.4867, country: 'IN' },
            { name: 'Chennai', lat: 13.0827, lon: 80.2707, country: 'IN' },
            { name: 'Kolkata', lat: 22.5726, lon: 88.3639, country: 'IN' },
            { name: 'Pune', lat: 18.5204, lon: 73.8567, country: 'IN' },
            { name: 'Ahmedabad', lat: 23.0225, lon: 72.5714, country: 'IN' },
            { name: 'Surat', lat: 21.1702, lon: 72.8311, country: 'IN' }
        ];

        // Weather code to icon mapping (WMO Weather codes)
        function getWeatherIcon(code, isDay) {
            const icons = {
                0: isDay ? '☀️' : '🌙',      // Clear sky
                1: isDay ? '🌤️' : '🌙',      // Mainly clear
                2: '⛅',                      // Partly cloudy
                3: '☁️',                      // Overcast
                45: '🌫️',                    // Fog
                48: '🌫️',                    // Depositing rime fog
                51: '🌦️',                    // Light drizzle
                53: '🌦️',                    // Moderate drizzle
                55: '🌧️',                    // Dense drizzle
                61: '🌧️',                    // Slight rain
                63: '🌧️',                    // Moderate rain
                65: '🌧️',                    // Heavy rain
                71: '🌨️',                    // Slight snow
                73: '🌨️',                    // Moderate snow
                75: '❄️',                     // Heavy snow
                77: '❄️',                     // Snow grains
                80: '🌦️',                    // Slight rain showers
                81: '🌧️',                    // Moderate rain showers
                82: '🌧️',                    // Violent rain showers
                85: '🌨️',                    // Slight snow showers
                86: '🌨️',                    // Heavy snow showers
                95: '⛈️',                     // Thunderstorm
                96: '⛈️',                     // Thunderstorm with slight hail
                99: '⛈️'                      // Thunderstorm with heavy hail
            };
            return icons[code] || '🌤️';
        }

        // Weather code descriptions
        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Depositing rime fog',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow fall',
                73: 'Moderate snow fall',
                75: 'Heavy snow fall',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with slight hail',
                99: 'Thunderstorm with heavy hail'
            };
            return descriptions[code] || 'Unknown';
        }

        // City input event listener for suggestions
        cityInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            
            if (query.length < 2) {
                suggestionsBox.classList.remove('active');
                return;
            }

            const filteredCities = cities.filter(city => 
                city.name.toLowerCase().startsWith(query)
            ).slice(0, 5);

            if (filteredCities.length > 0) {
                suggestionsBox.innerHTML = filteredCities.map(city => 
                    `<div class="suggestion-item" data-city='${JSON.stringify(city)}'>${city.name}</div>`
                ).join('');
                suggestionsBox.classList.add('active');
            } else {
                suggestionsBox.classList.remove('active');
            }
        });

        // Click on suggestion
        suggestionsBox.addEventListener('click', function(e) {
            if (e.target.classList.contains('suggestion-item')) {
                const cityData = JSON.parse(e.target.dataset.city);
                cityInput.value = cityData.name;
                suggestionsBox.classList.remove('active');
                getWeather(cityData);
            }
        });

        // Close suggestions when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                suggestionsBox.classList.remove('active');
            }
        });

        // Search button click
        searchBtn.addEventListener('click', function() {
            const cityName = cityInput.value.trim();
            if (cityName) {
                const cityData = cities.find(c => 
                    c.name.toLowerCase() === cityName.toLowerCase()
                );
                if (cityData) {
                    getWeather(cityData);
                } else {
                    showError('🌍 City not found in our database. Please select from suggestions.');
                }
                suggestionsBox.classList.remove('active');
            }
        });

        // Enter key press
        cityInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const cityName = this.value.trim();
                if (cityName) {
                    const cityData = cities.find(c => 
                        c.name.toLowerCase() === cityName.toLowerCase()
                    );
                    if (cityData) {
                        getWeather(cityData);
                    } else {
                        showError('🌍 City not found in our database. Please select from suggestions.');
                    }
                    suggestionsBox.classList.remove('active');
                }
            }
        });

        // Fetch weather data using Open-Meteo API (No API key required!)
        async function getWeather(cityData) {
            try {
                loading.classList.add('active');
                weatherInfo.classList.remove('active');
                error.classList.remove('active');

                // Open-Meteo API endpoint
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${cityData.lat}&longitude=${cityData.lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure&timezone=auto`
                );

                if (!response.ok) {
                    throw new Error('Failed to fetch weather data');
                }

                const data = await response.json();
                displayWeather(data, cityData);

            } catch (err) {
                showError('❌ Something went wrong. Please try again.');
            } finally {
                loading.classList.remove('active');
            }
        }

        // Display weather data
        function displayWeather(data, cityData) {
            const current = data.current;
            const isDay = new Date().getHours() >= 6 && new Date().getHours() < 18;
            
            document.getElementById('cityName').textContent = cityData.name;
            document.getElementById('countryFlag').textContent = getFlagEmoji(cityData.country);
            document.getElementById('temperature').textContent = Math.round(current.temperature_2m) + '°C';
            document.getElementById('description').textContent = getWeatherDescription(current.weather_code);
            document.getElementById('weatherIcon').textContent = getWeatherIcon(current.weather_code, isDay);
            document.getElementById('humidity').textContent = current.relative_humidity_2m + '%';
            document.getElementById('windSpeed').textContent = current.wind_speed_10m + ' km/h';
            document.getElementById('feelsLike').textContent = Math.round(current.apparent_temperature) + '°C';
            document.getElementById('pressure').textContent = current.surface_pressure + ' hPa';

            weatherInfo.classList.add('active');
        }

        // Show error message
        function showError(message) {
            error.textContent = message;
            error.classList.add('active');
            weatherInfo.classList.remove('active');
        }

        // Get flag emoji from country code
        function getFlagEmoji(countryCode) {
            return countryCode
                .toUpperCase()
                .replace(/./g, char => String.fromCodePoint(127397 + char.charCodeAt()));
        }

        // Load default city weather (optional)
        window.addEventListener('load', function() {
            const defaultCity = cities.find(c => c.name === 'Jaipur');
            if (defaultCity) {
                getWeather(defaultCity);
            }
        });
    </script>
</body>
</html>
