<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - MovieFlix</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-film"></i>
                    <span>MovieFlix</span>
                </a>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html" class="nav-link">Home</a>
                <a href="movies.html" class="nav-link">Movies</a>
                <a href="recommendations.html" class="nav-link active">Recommendations</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>
            <div class="nav-actions">
                <div class="user-menu" id="userMenu">
                    <button class="user-btn" id="userMenuBtn">
                        <i class="fas fa-user-circle"></i>
                        <span id="userName"></span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="section">
                <div class="recommendation-header">
                    <h2><i class="fas fa-magic"></i> Personalized Recommendations</h2>
                    <p class="recommendation-subtitle">Based on your ratings and favorite genres</p>
                </div>
                
                <div class="recommendation-tabs">
                    <button class="tab-btn active" data-tab="personalized">
                        <i class="fas fa-user"></i> For You
                    </button>
                    <button class="tab-btn" data-tab="hybrid">
                        <i class="fas fa-chart-line"></i> Hybrid
                    </button>
                    <button class="tab-btn" data-tab="trending">
                        <i class="fas fa-fire"></i> Trending
                    </button>
                </div>
                
                <div class="movies-grid" id="recommendationsGrid">
                    <div class="skeleton-loader">
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <style>
        .recommendation-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .recommendation-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .recommendation-subtitle {
            color: var(--text-secondary);
        }
        
        .recommendation-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: var(--background-light);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/recommendations.js"></script>
</body>
</html>
